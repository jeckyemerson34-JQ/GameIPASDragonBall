<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misi Goku: 9 Dragon Ball Cahaya</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Bangers&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --db-orange: #ff8a00;
            --db-red: #e11d48;
            --db-yellow: #facc15;
            --db-blue: #2563eb;
            --kame-yellow: #fff9c4;
            --kame-yellow-glow: #ffd700;
            --enemy-blue: #b9e9ff;
            --enemy-blue-glow: #009dff;
        }
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #000;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        .font-dragon { font-family: 'Luckiest+Guy', cursive; }
        .font-bangers { font-family: 'Bangers', cursive; letter-spacing: 2px; }
        
        .landing-bg {
            background-image: url('https://i.imgur.com/e2UCPgB.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Gaya Bola Naga di Beranda */
        .dragonball-btn {
            background: radial-gradient(circle, #fbbf24 0%, #f59e0b 70%, #d97706 100%);
            box-shadow: 0 4px 0 #92400e, 0 10px 20px rgba(0,0,0,0.5);
            border: 3px solid #fff;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: absolute;
            z-index: 40;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .dragonball-btn:not(.locked):hover {
            transform: scale(1.2) translateY(-5px);
            z-index: 50;
            box-shadow: 0 0 25px #fbbf24;
        }

        .dragonball-btn.locked {
            filter: grayscale(1) brightness(0.4);
            cursor: not-allowed;
            opacity: 0.6;
            border-color: #444;
        }

        .dragonball-btn.current-level {
            animation: pulse-active 1.5s infinite;
            border-color: #00ff00;
            border-width: 4px;
        }

        @keyframes pulse-active {
            0%, 100% { transform: scale(1); box-shadow: 0 0 10px #00ff00; }
            50% { transform: scale(1.1); box-shadow: 0 0 30px #00ff00; }
        }

        /* Jalur Panah */
        #path-svg {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 35;
        }
        .path-line {
            fill: none;
            stroke: rgba(255, 255, 255, 0.3);
            stroke-width: 3;
            stroke-dasharray: 10, 5;
            transition: stroke 0.5s;
        }
        .path-completed {
            stroke: #ffd700;
            stroke-width: 5;
            stroke-dasharray: none;
            filter: drop-shadow(0 0 5px gold);
        }

        /* Efek Serangan */
        #effect-container {
            position: absolute;
            width: 100%;
            height: 200px;
            top: 50%; 
            left: 0;
            transform: translateY(-50%);
            pointer-events: none;
            z-index: 10;
            display: none;
        }
        .energy-ball {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 12;
            animation: energy-shake 0.1s infinite;
        }
        .energy-beam {
            position: absolute;
            left: 50%; 
            top: 50%;
            height: 100px;
            width: 0;
            transform: translateY(-50%);
            transform-origin: left center; 
            z-index: 11;
        }
        .effect-to-hero .energy-beam { transform: translateY(-50%) scaleX(-1); }

        .theme-yellow .energy-ball { background: var(--kame-yellow); box-shadow: 0 0 50px 30px white, 0 0 100px 60px var(--kame-yellow-glow); }
        .theme-yellow .energy-beam { background: linear-gradient(to right, white, transparent); box-shadow: 0 0 70px var(--kame-yellow-glow); }
        .theme-blue .energy-ball { background: var(--enemy-blue); box-shadow: 0 0 50px 30px white, 0 0 100px 60px var(--enemy-blue-glow); }
        .theme-blue .energy-beam { background: linear-gradient(to right, white, transparent); box-shadow: 0 0 70px var(--enemy-blue-glow); }

        @keyframes fire-beam { 0% { width: 0; opacity: 1; } 30% { width: 60%; opacity: 1; } 80% { width: 60%; opacity: 1; } 100% { width: 60%; opacity: 0; } }
        .beam-active { animation: fire-beam 1.2s ease-out forwards; }
        
        /* Animasi Pengumpulan Energi (Charging) */
        @keyframes charging-energy {
            0% { transform: translate(-50%, -50%) scale(0.2); opacity: 0.5; }
            80% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
        }
        .charging-active { animation: charging-energy 2.8s ease-in-out forwards; }

        @keyframes energy-shake { 0% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -52%) scale(1.1); } 100% { transform: translate(-50%, -50%) scale(1); } }
        @keyframes status-pop { 0% { transform: scale(0.5); opacity: 0; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        .status-show { animation: status-pop 0.4s ease-out forwards; }

        .battle-overlay { background: rgba(0,0,0,0.2); position: absolute; inset: 0; z-index: -1; }
        
        /* Gaya Tombol Kontrol Kanan Atas */
        .top-right-controls {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 100;
            display: flex;
            gap: 10px;
        }

        .control-btn {
            background: rgba(0,0,0,0.5);
            border: 2px solid #fff;
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .control-btn:hover { transform: scale(1.1); background: rgba(0,0,0,0.8); }

        /* Gaya Tombol Pengembang */
        #dev-btn {
            position: fixed;
            bottom: 15px;
            left: 15px;
            z-index: 100;
            background: rgba(255, 138, 0, 0.8);
            border: 2px solid #fff;
            color: #fff;
            padding: 8px 16px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 10px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        #dev-btn:hover { transform: scale(1.05); background: rgba(255, 138, 0, 1); }

        /* Gaya Modal Pengembang */
        #dev-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-blur: 8px;
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .dev-card {
            background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
            border: 4px solid var(--db-yellow);
            border-radius: 2rem;
            max-width: 350px;
            width: 100%;
            padding: 2rem;
            text-align: center;
            position: relative;
            box-shadow: 0 0 30px rgba(250, 204, 21, 0.3);
            animation: status-pop 0.4s ease-out;
        }
        .dev-photo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid var(--db-yellow);
            margin: 0 auto 1.5rem;
            object-fit: cover;
            background: #333;
            box-shadow: 0 0 15px var(--db-yellow);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #f97316; border-radius: 10px; }
    </style>
</head>

                { q: "Alat pernapasan pada manusia adalah...", options: ["Insang", "Paru-paru", "Trakea", "Kulit"], correct: 1 },
                { q: "Proses penyerapan sari-sari makanan terjadi di...", options: ["Lambung", "Mulut", "Usus Besar", "Usus Halus"], correct: 3 },
                { q: "Organ tubuh yang berfungsi memompa darah ke seluruh tubuh adalah...", options: ["Paru-paru", "Hati", "Jantung", "Ginjal"], correct: 2 },
                { q: "Enzim ptialin di dalam mulut berfungsi untuk mengubah amilum menjadi...", options: ["Lemak", "Glukosa", "Protein", "Vitamin"], correct: 1 },
                { q: "Tulang belakang berfungsi untuk...", options: ["Melindungi otak", "Menopang tubuh", "Melindungi paru-paru", "Alat pencernaan"], correct: 1 }
            ],
            6: [
                { q: "Alat yang dapat mengubah energi listrik menjadi energi gerak adalah...", options: ["Setrika", "Lampu", "Kipas Angin", "Radio"], correct: 2 },
                { q: "Bahan yang dapat menghantarkan panas atau listrik dengan baik disebut...", options: ["Isolator", "Konduktor", "Radiator", "Adaptor"], correct: 1 },
                { q: "Rangkaian listrik yang disusun secara sejajar disebut rangkaian...", options: ["Seri", "Paralel", "Campuran", "Tunggal"], correct: 1 },
                { q: "Karet dan plastik adalah contoh bahan...", options: ["Konduktor", "Isolator", "Magnetik", "Logam"], correct: 1 },
                { q: "Pusat pembangkit listrik yang menggunakan tenaga air disebut...", options: ["PLTU", "PLTA", "PLTN", "PLTS"], correct: 1 }
            ],
            7: [
                { q: "Kemampuan makhluk hidup untuk menyesuaikan diri dengan lingkungannya disebut...", options: ["Fotosintesis", "Adaptasi", "Reproduksi", "Iritabilitas"], correct: 1 },
                { q: "Cicak memutuskan ekornya untuk mengelabui musuh. Cara ini disebut...", options: ["Mimikri", "Autotomi", "Ekolokasi", "Hibernasi"], correct: 1 },
                { q: "Bunglon mengubah warna kulitnya sesuai tempat hinggapnya. Hal ini disebut...", options: ["Mimikri", "Autotomi", "Ekolokasi", "Kamuflase"], correct: 0 },
                { q: "Tumbuhan kaktus memiliki daun berbentuk duri bertujuan untuk...", options: ["Menyerap air", "Mengurangi penguapan", "Menakuti musuh", "Melakukan fotosintesis"], correct: 1 },
                { q: "Kaki berselaput pada bebek berfungsi untuk...", options: ["Berlari cepat", "Bertengger di pohon", "Berenang dan berjalan di lumpur", "Mencengkeram mangsa"], correct: 2 }
            ],
            8: [
                { q: "Pusat tata surya kita adalah...", options: ["Bumi", "Bulan", "Matahari", "Jupiter"], correct: 2 },
                { q: "Planet yang dikenal sebagai 'Planet Merah' adalah...", options: ["Venus", "Mars", "Saturnus", "Merkurius"], correct: 1 },
                { q: "Benda langit yang mengelilingi planet disebut...", options: ["Asteroid", "Komet", "Satelit", "Meteor"], correct: 2 },
                { q: "Planet terbesar dalam tata surya kita adalah...", options: ["Bumi", "Neptunus", "Uranus", "Jupiter"], correct: 3 },
                { q: "Benda langit yang sering disebut bintang beralih adalah...", options: ["Bintang", "Meteor", "Planet", "Bulan"], correct: 1 }
            ],
            9: [
                { q: "Sumber energi yang tidak akan habis meskipun digunakan secara terus-menerus disebut...", options: ["Energi fosil", "Energi alternatif", "Energi nuklir", "Energi kimia"], correct: 1 },
                { q: "Alat yang digunakan untuk mengubah energi cahaya matahari menjadi energi listrik adalah...", options: ["Generator", "Turbin", "Panel Surya", "Aki"], correct: 2 },
                { q: "Gas yang dihasilkan dari kotoran ternak untuk bahan bakar disebut...", options: ["Oksigen", "Nitrogen", "Biogas", "Karbon monoksida"], correct: 2 },
                { q: "Contoh sumber energi alternatif yang berasal dari dalam bumi adalah...", options: ["Angin", "Panas Bumi", "Cahaya Matahari", "Air Terjun"], correct: 1 },
                { q: "Kincir angin memanfaatkan energi ... untuk menghasilkan listrik.", options: ["Panas", "Kimia", "Angin/Gerak", "Cahaya"], correct: 2 }
            ]
        };

        let gameState = { 
            collected: [], 
            currentLoc: null, 
            currentIdx: 0, 
            gokuHp: 100, 
            enemyHp: 100, 
            canAnswer: true,
            musicStarted: false,
            isMuted: false
        };

        const openingMusic = document.getElementById('opening-music');
        const battleMusic = document.getElementById('battle-music');
        const attackSound = document.getElementById('attack-sound');
        const musicIcon = document.getElementById('music-icon');
        const fullscreenIcon = document.getElementById('fullscreen-icon');

        function playOpeningMusic() {
            if (!gameState.musicStarted) {
                openingMusic.play().catch(e => {});
                gameState.musicStarted = true;
            }
        }

        // Fungsi Layar Penuh
        function toggleFullScreen(event) {
            if (event) event.stopPropagation();
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.error(`Gagal masuk mode layar penuh: ${err.message}`);
                });
                fullscreenIcon.innerText = "✕";
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                    fullscreenIcon.innerText = "⛶";
                }
            }
        }

        function toggleMute(event) {
            event.stopPropagation();
            gameState.isMuted = !gameState.isMuted;
            openingMusic.muted = gameState.isMuted;
            battleMusic.muted = gameState.isMuted;
            attackSound.muted = gameState.isMuted;
            musicIcon.innerText = gameState.isMuted ? "🔈" : "🔊";
            if (!gameState.isMuted) {
                if (document.getElementById('battle-screen').classList.contains('hidden')) openingMusic.play();
                else battleMusic.play();
            }
        }

        function toggleDevModal(event, show) {
            if (event) event.stopPropagation();
            const modal = document.getElementById('dev-modal');
            modal.style.display = show ? 'flex' : 'none';
        }

        document.addEventListener('DOMContentLoaded', () => { renderScatteredBalls(); });

        function openRadar() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('map-screen').classList.remove('hidden');
            renderMap();
        }

        function renderScatteredBalls() {
            const container = document.getElementById('scattered-balls');
            const svg = document.getElementById('path-svg');
            container.innerHTML = '';
            svg.innerHTML = svg.innerHTML; 

            for (let i = 1; i <= 9; i++) {
                const pos = ballPositions[i-1];
                const isCollected = gameState.collected.includes(i);
                const isAvailable = (i === 1 || gameState.collected.includes(i - 1));
                const isCurrent = isAvailable && !isCollected;

                if (i < 9) {
                    const nextPos = ballPositions[i];
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", pos.left + "%"); line.setAttribute("y1", pos.top + "%");
                    line.setAttribute("x2", nextPos.left + "%"); line.setAttribute("y2", nextPos.top + "%");
                    line.classList.add("path-line");
                    if (isCollected) line.classList.add("path-completed");
                    line.setAttribute("marker-end", isCollected ? "url(#arrow-gold)" : "url(#arrow)");
                    svg.appendChild(line);
                }

                const ball = document.createElement('button');
                ball.className = "dragonball-btn w-12 h-12 md:w-16 md:h-16 rounded-full text-red-600 font-bold border-2 border-white";
                ball.style.top = pos.top + "%"; ball.style.left = pos.left + "%";
                if (!isAvailable) ball.classList.add('locked');
                if (isCurrent) ball.classList.add('current-level');
                let stars = '★'.repeat(((i-1) % 7) + 1);
                ball.innerHTML = `<span class="text-[6px] md:text-[8px] leading-none">${stars}</span><span class="text-[10px] md:text-xs">${i}</span>`;
                ball.onclick = () => { if (isAvailable && !isCollected) startLevelDirectly(i); };
                container.appendChild(ball);
            }
        }

        function startLevelDirectly(levelId) {
            playOpeningMusic(); 
            const loc = locations.find(l => l.id === levelId);
            if (loc) { 
                document.getElementById('start-screen').classList.add('hidden'); 
                startBattle(loc); 
            }
        }

        function goToHome() {
            battleMusic.pause();
            battleMusic.currentTime = 0;
            if (!gameState.isMuted) {
                openingMusic.currentTime = 0;
                openingMusic.play();
            }
            resetBattleStyles();
            document.getElementById('map-screen').classList.add('hidden');
            document.getElementById('battle-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
            renderScatteredBalls(); 
        }

        function resetBattleStyles() {
            const bs = document.getElementById('battle-screen');
            bs.style.backgroundImage = 'none';
            document.getElementById('battle-overlay-div').classList.add('hidden');
            document.getElementById('answer-status').classList.add('hidden');
            hideEffect();
        }

        function renderMap() {
            const container = document.querySelector('.map-container');
            container.innerHTML = '';
            locations.forEach(loc => {
                const isCollected = gameState.collected.includes(loc.id);
                const isAvailable = (loc.id === 1 || gameState.collected.includes(loc.id - 1));
                const btn = document.createElement('button');
                btn.className = `relative flex flex-col items-center justify-center p-6 rounded-[2rem] border-4 transition-all shadow-xl 
                    ${isCollected ? 'bg-green-100 border-green-500 opacity-80' : 
                      isAvailable ? 'bg-white border-orange-500 hover:scale-105 active:scale-95' : 
                      'bg-gray-200 border-gray-400 opacity-50 grayscale'}`;
                btn.onclick = () => { if (isAvailable) { document.getElementById('map-screen').classList.add('hidden'); startBattle(loc); } };
                btn.innerHTML = `<div class="text-5xl mb-2">${isCollected ? '✅' : isAvailable ? loc.icon : '🔒'}</div><div class="text-xs font-bold uppercase mb-1">${loc.property}</div><div class="text-[10px] font-dragon uppercase">${loc.name}</div>`;
                container.appendChild(btn);
            });
            document.getElementById('collected-count').innerText = `${gameState.collected.length}/9`;
        }

        function startBattle(loc) {
            openingMusic.pause();
            battleMusic.currentTime = 0;
            if (!gameState.isMuted) battleMusic.play();

            gameState.currentLoc = loc;
            gameState.enemyHp = 100;
            gameState.gokuHp = 100;
            gameState.currentIdx = 0;
            gameState.canAnswer = true;
            updateHpBars();
            const bs = document.getElementById('battle-screen');
            if (loc.battleBg) { bs.style.backgroundImage = `url('${loc.battleBg}')`; document.getElementById('battle-overlay-div').classList.remove('hidden'); }
            document.getElementById('enemy-label').innerText = loc.enemy.toUpperCase();
            loadQuestion();
            bs.classList.remove('hidden');
        }

        function loadQuestion() {
            const loc = gameState.currentLoc;
            const qData = questionBank[loc.id][gameState.currentIdx];
            document.getElementById('quest-counter').innerText = `SOAL ${gameState.currentIdx + 1}/5`;
            displayQuestion(qData);
        }

        function displayQuestion(qData) {
            document.getElementById('question-text').innerText = qData.q;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            qData.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-2.5 rounded-lg bg-white hover:bg-blue-600 hover:text-white transition-all font-bold text-[10px] md:text-[12px] border-2 border-slate-200 shadow-sm";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(idx, qData);
                container.appendChild(btn);
            });
            gameState.canAnswer = true;
        }

        function showVisualEffect(type) {
            const container = document.getElementById('effect-container');
            const ball = document.getElementById('energy-ball-el');
            const beam = document.getElementById('effect-beam-el');
            
            container.classList.remove('effect-to-hero', 'theme-yellow', 'theme-blue');
            ball.classList.remove('charging-active');
            beam.classList.remove('beam-active');
            void container.offsetWidth; 
            
            if (type === 'correct') {
                container.classList.add('theme-yellow');
                container.style.display = 'block';
                if (!gameState.isMuted) {
                    attackSound.currentTime = 0;
                    attackSound.play();
                }
                ball.classList.add('charging-active');
                setTimeout(() => {
                    beam.classList.add('beam-active');
                    setTimeout(() => { hideEffect(); }, 1500);
                }, 3000); 
            } else {
                container.classList.add('effect-to-hero', 'theme-blue');
                container.style.display = 'block';
                beam.classList.add('beam-active');
                setTimeout(() => { hideEffect(); }, 1200);
            }
        }

        function hideEffect() {
            const container = document.getElementById('effect-container');
            if(container) container.style.display = 'none';
        }

        function checkAnswer(chosen, qData) {
            if (!gameState.canAnswer) return;
            gameState.canAnswer = false;
            const statusEl = document.getElementById('answer-status');
            statusEl.classList.remove('hidden', 'text-green-500', 'text-red-500', 'status-show');
            void statusEl.offsetWidth; 

            const isCorrect = chosen === qData.correct;
            if (isCorrect) {
                statusEl.innerText = "✓ BERHASIL!";
                statusEl.classList.add('text-green-500', 'status-show');
                showVisualEffect('correct');
                gameState.enemyHp -= 20;
            } else {
                statusEl.innerText = "✗ SALAH!";
                statusEl.classList.add('text-red-500', 'status-show');
                showVisualEffect('to-hero');
                gameState.gokuHp -= 34;
            }
            updateHpBars();

            const nextStepDelay = isCorrect ? 5000 : 1500;

            setTimeout(() => {
                statusEl.classList.add('hidden');
                if (gameState.gokuHp <= 0) showFinalFeedback(false, "KALAH!", "Ayo pelajari lagi!");
                else if (gameState.enemyHp <= 0) showFinalFeedback(true, "MENANG!", "Bola Naga Berhasil Didapat!");
                else {
                    gameState.currentIdx++;
                    if (gameState.currentIdx >= 5) showFinalFeedback(true, "MENANG!", "Misi Level Ini Selesai!");
                    else loadQuestion();
                }
            }, nextStepDelay);
        }

        function updateHpBars() {
            document.getElementById('goku-hp').style.width = gameState.gokuHp + '%';
            document.getElementById('enemy-hp').style.width = gameState.enemyHp + '%';
        }

        function showFinalFeedback(isWin, title, msg) {
            battleMusic.pause();
            document.getElementById('feedback-title').innerText = title;
            document.getElementById('feedback-msg').innerText = msg;
            document.getElementById('feedback-modal').classList.remove('hidden');
            document.getElementById('feedback-btn').innerText = isWin ? "AMBIL BOLA NAGA" : "COBA LAGI";
            
            if (isWin) {
                document.getElementById('feedback-icon').innerText = "🔮";
                document.getElementById('feedback-btn').onclick = () => {
                    if (!gameState.collected.includes(gameState.currentLoc.id)) gameState.collected.push(gameState.currentLoc.id);
                    document.getElementById('feedback-modal').classList.add('hidden');
                    if (gameState.collected.length === 9) {
                        document.getElementById('battle-screen').classList.add('hidden');
                        document.getElementById('end-screen').classList.remove('hidden');
                        renderFinalBalls();
                    } else goToHome();
                };
            } else {
                document.getElementById('feedback-icon').innerText = "💥";
                document.getElementById('feedback-btn').onclick = () => { document.getElementById('feedback-modal').classList.add('hidden'); goToHome(); };
            }
        }

        function renderFinalBalls() {
            const container = document.getElementById('ball-display');
            container.innerHTML = '';
            for(let i=1; i<=9; i++) {
                const ball = document.createElement('div');
                ball.className = "w-16 h-16 md:w-20 md:h-20 dragonball-bg rounded-full flex flex-col items-center justify-center text-red-600 font-bold shadow-xl border-4 border-white ball-glow";
                let stars = '★'.repeat(((i-1) % 7) + 1);
                ball.innerHTML = `<span class="text-[10px] md:text-xs leading-none">${stars}</span><span class="text-sm md:text-lg">${i}</span>`;
                container.appendChild(ball);
            }
        }
    </script>
</body>
</html>
